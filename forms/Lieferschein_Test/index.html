<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arbeitsnachweis / Lieferschein</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="page-bg" aria-hidden="true"></div>
<header class="runtime-header">
<div class="runtime-logo-wrap" id="runtimeLogo"></div>
<div class="runtime-title-block">
<h1 id="runtimeTitle">Arbeitsnachweis / Lieferschein</h1>
<div id="runtimeSubtitle" class="runtime-subtitle"></div>
<div id="runtimeVersion" class="runtime-version"></div>
</div>
</header>
<main class="runtime-layout">
<section class="preview-shell runtime-form-shell">
<div id="runtimeStatus" class="status">Runtime wird geladen.</div>
<div id="runtimeForm"></div>
<details class="section runtime-protocol-section" open>
<summary><div class="summary-main"><span><span class="summary-title">Protokollliste</span><span class="summary-sub">Gespeicherte Protokolle dieser Webapp</span></span></div></summary>
<div class="section-body runtime-protocol-body"><div id="runtimeProtocolList" class="section-list"></div></div>
</details>
<div class="button-row"><button id="runtimeTakeProtocolButton" class="btn-primary">Protokoll übernehmen</button><button id="runtimeNewProtocolButton" class="btn-secondary">Neues Protokoll</button><button id="runtimeClearDraftButton" class="btn-secondary">Formular leeren</button></div>
</section>
</main>
<script src="js/form-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/signature-utils.js"></script>
<script src="js/version-info.js"></script>
<script src="js/runtime-state.js"></script>
<script src="js/runtime-app.js"></script>
<script src="js/runtime-coordinates-field.js"></script>
<script src="js/runtime-assets.js"></script>
<script src="js/runtime-footer.js"></script>
<script src="js/runtime-signature-actions.js"></script>
<script src="js/runtime-zip-export-actions.js" defer></script>
<script src="../../js/portal-prefill.js" defer></script>
</body>
</html>
